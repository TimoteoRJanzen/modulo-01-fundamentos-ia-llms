<output id="output"></output>
<!-- https://www.jsdelivr.com/package/npm/markdown -->
<script src="https://cdn.jsdelivr.net/npm/markdown@0.5.0/lib/markdown.min.js"></script>

<script>
    const output = document.getElementById("output")

    ;(async () => {
        const params = await LanguageModel.params()
        console.log("Language Model Params:", params);

        const temperature = params.defaultTemperature
        const topK = params.defaultTopK

        const initialPrompts = [
            {
                role: "system",
                content: "Você é um tradutor, que traduz texto do português (Brasil) para o inglês. Responda apenas com a tradução da frase: "
            }
        ]

        const question = "Este é um tradutor de texto que utiliza IA integrada ao navegador para gerar a resposta"
        output.innerHTML = "Gerando resposta..."

        const session = await LanguageModel.create({
            expectedInputLanguages: ["pt"],
            temperature: 0,
            topK: 3,
            initialPrompts,
        })

        const responseStream = await session.promptStreaming([
            {
                role: "user",
                content: question
            }
        ])
        output.innerHTML = ""

        let fullText = ""
        for await (const token of responseStream) {
            fullText += token;
            output.innerHTML = markdown.toHTML(fullText);
            //console.log(token);
        }

    })();

</script>
